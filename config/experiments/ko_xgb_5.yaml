name: ko_xgb_5

data:
  ticker: KO
  interval: 5d
  start: "2014-01-01"
  end: "2024-01-01"

features:
  sma_windows: [5, 10, 20]
  ema_windows: [12, 26]

target:
  type: forward_return
  horizon: 1

backtest:
  n_splits: 5
  min_train_size: 252
  embargo: 2

model:
  class: xgb
  scale_features: false
  params:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 4
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 1.0
    random_state: 42
