name: ko_lstm

data:
  ticker: KO
  interval: 5d
  start: "2014-01-01"
  end: "2024-01-01"

features:
  sma_windows: [5, 10, 20]
  ema_windows: [12, 26]

target:
  type: forward_return
  horizon: 1

backtest:
  n_splits: 5
  min_train_size: 252
  embargo: 2

model:
  class: lstm
  scale_features: false
  params:
    seq_len: 20
    hidden_size: 64
    max_epochs: 50
